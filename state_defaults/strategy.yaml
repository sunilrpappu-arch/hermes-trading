# v22 — Session breakout mode: relaxed RSI gate + MTF bypass during Asia/London/US opens
#        Per-pair RSI threshold tuning via self_improve reflection cycle
# Each pair is classified independently (bull/bear/sideways) using its own 4H ADX + 50MA.
# New in v11:
#   - Bull regime: breakout long above resistance; false-breakout short; bearish RSI divergence short
#   - Bear regime: breakdown short below support; false-breakdown long; bullish RSI divergence long
#   - Shorts in bull regime blocked while active breakout is occurring (don't fight momentum)
#   - Longs in bear regime blocked while active breakdown is occurring

# Bull regime: price above 50MA on 4H, ADX >= 20
bull:
  long_threshold:   35
  short_on_lq_only: true

# Bear regime: price below 50MA on 4H, ADX >= 20
bear:
  short_threshold:  60
  long_on_lq_only:  true

# Sideways regime: ADX < 20 on 4H — mean-reversion at range extremes
sideways:
  adx_threshold:   20.0
  range_entry_pct: 0.20
  or_bars:         4
  swing_lookback:  20

# MTF soft gate: require at least 1 higher-timeframe confirmation before entering
# Exceptions: manual entries and liquidity grabs bypass this gate
# Signals: 4H MACD bull/bear, 4H above/below 50MA, 1H RSI divergence, 1H MACD crossover
mtf:
  enabled:         true
  require_signals: 1   # ≥1 HTF signal required (0 = disabled)

trend_filter:
  enabled:   true
  ma_period: 50

liquidity_grab:
  enabled:               true
  wick_ratio:            2.0
  sweep_pct:             0.002
  overrides_trend_filter: true

drawdown:
  per_pair_cap:  0.10
  portfolio_cap: 0.08

# Post-loss cooldown: after a stop-loss on a pair, wait before re-entering
cooldown:
  after_stop_loss_minutes: 30   # 30 min cooldown per pair after stop-loss

# Daily loss limit: halt all new entries if down more than X% of capital on the day
# Resets automatically at midnight UTC
daily_loss:
  max_loss_pct: 0.03            # 3% of total capital = $30 on $1000

# Dynamic leverage per macro regime
# Higher in calm/ranging (more predictable), lower in volatile/extreme (capital preservation)
leverage:
  sideways:     2.0   # ranging market → 2x (mean-reversion high probability)
  calm:         2.0   # calm trend     → 2x
  normal:       1.5   # normal market  → 1.5x
  volatile:     1.0   # high vol       → no leverage
  extreme:      1.0   # extreme vol    → no leverage, capital preservation
  max_leverage: 3.0   # hard cap — dashboard cannot exceed this

take_profit_pct: 3.0
stop_loss_pct:   1.8
position_size_r: 0.05

# Session breakout mode — fires during Asia/London/US market open windows
# Requires BB expansion + volume spike; relaxes RSI gate and drops MTF requirement
# Only active when fear/greed score is in normal range (18–85)
session_breakout:
  enabled:              true
  rsi_relax_pts:        5      # add to long_threshold / subtract from short_threshold
  volume_spike_min:     1.5    # recent volume must be ≥1.5× 24h avg to confirm session move
  require_bb_expanding: true   # must have BB squeeze → expansion firing
  min_fg_score:         18     # blocked if fear/greed below this (extreme fear)
  max_fg_score:         85     # blocked if fear/greed above this (extreme greed)

version: '22'
