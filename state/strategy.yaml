# v09 — Regime-separated entry strategy
# Each pair is classified independently (bull/bear/sideways) using its own 4H ADX + 50MA.
# Different entry rules apply per regime. MTF is informational only (no hard gate).

# Bull regime: price above 50MA on 4H, ADX >= 20
# Long bias — buy RSI dips. Short only on confirmed liquidity grabs.
bull:
  long_threshold:   35      # RSI < 35 in uptrend → buy the dip
  short_on_lq_only: true    # shorts only when a liquidity grab is confirmed

# Bear regime: price below 50MA on 4H, ADX >= 20
# Short bias — sell RSI bounces. Long only on confirmed liquidity grabs.
bear:
  short_threshold:  60      # RSI > 60 in downtrend → sell the bounce
  long_on_lq_only:  true    # longs only when a liquidity grab is confirmed

# Sideways regime: ADX < 20 on 4H — mean-reversion at range extremes
sideways:
  adx_threshold:   20.0
  range_entry_pct: 0.20     # enter when price is in bottom/top 20% of PDH-PDL range
  or_bars:         4
  swing_lookback:  20

# MTF signals are logged on every entry but no longer block trades
mtf:
  enabled:         true
  require_signals: 0        # 0 = informational only

trend_filter:
  enabled:   true
  ma_period: 50

liquidity_grab:
  enabled:               true
  wick_ratio:            2.0
  sweep_pct:             0.002
  overrides_trend_filter: true

drawdown:
  per_pair_cap:  0.10
  portfolio_cap: 0.08

take_profit_pct: 3.0
stop_loss_pct:   1.8
position_size_r: 0.05

# Trailing SL — activates once price reaches 1R profit
# Phase 1: move SL to breakeven at 1R
# Phase 2: trail at 50% of peak gain (locks in half the move)
trailing_sl:
  enabled:       true
  trail_pct:     0.50   # trail SL at 50% of (peak - entry)

version: '10'
